<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --fg: #e8e8f0;
            --muted: #4a4a5a;
            --accent: #00ff88;
            --accent-alt: #00ccff;
            --danger: #ff3366;
            --card: #15151f;
            --border: #2a2a3a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0f1a2a 50%, #0a0a0f 100%);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 720px;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 
                0 0 80px rgba(0, 255, 136, 0.1),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
        }
        
        @media (min-width: 480px) {
            .game-container {
                border-radius: 24px;
                height: calc(100vh - 40px);
                max-height: 700px;
            }
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(12px);
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 10;
        }
        
        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(2.5rem, 10vw, 4rem);
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-family: 'Orbitron', monospace;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            color: var(--muted);
            margin-bottom: 3rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }
        
        .score-display {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(4rem, 15vw, 6rem);
            color: var(--accent);
            margin-bottom: 0.25rem;
            line-height: 1;
        }
        
        .best-score {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 2.5rem;
            letter-spacing: 0.05em;
        }
        
        .best-score span {
            color: var(--accent-alt);
            font-weight: 700;
        }
        
        .btn {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 1rem 3rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
            color: var(--bg);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 15px 40px rgba(0, 255, 136, 0.35),
                0 5px 15px rgba(0, 204, 255, 0.2);
        }
        
        .btn:active {
            transform: translateY(0) scale(0.98);
        }
        
        .btn:focus-visible {
            outline: 3px solid var(--accent-alt);
            outline-offset: 3px;
        }
        
        .instructions {
            position: absolute;
            bottom: 2.5rem;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .score-hud {
            position: absolute;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(2.5rem, 10vw, 4rem);
            color: var(--fg);
            text-shadow: 
                0 0 30px rgba(0, 255, 136, 0.6),
                0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 5;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        
        .score-hud.pop {
            transform: translateX(-50%) scale(1.3);
        }
        
        .new-best {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--danger);
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" aria-label="Flappy Bird Game"></canvas>
            <div class="score-hud" id="scoreHud" aria-live="polite">0</div>
            
            <div class="overlay" id="startScreen" role="dialog" aria-labelledby="gameTitle">
                <div class="title" id="gameTitle">FLAPPY</div>
                <div class="subtitle">Tap to fly through the pipes</div>
                <button class="btn" id="startBtn" aria-label="Start Game">PLAY</button>
                <div class="instructions">Space / Click / Tap to flap</div>
            </div>
            
            <div class="overlay hidden" id="gameOverScreen" role="dialog" aria-labelledby="gameOverTitle">
                <div class="subtitle" id="gameOverTitle">Game Over</div>
                <div class="score-display" id="finalScore" aria-label="Your Score">0</div>
                <div class="best-score">Best: <span id="bestScore">0</span></div>
                <div class="new-best hidden" id="newBestText">NEW RECORD</div>
                <button class="btn" id="restartBtn" aria-label="Play Again">RETRY</button>
            </div>
        </div>
    </div>
</body>
</html>
