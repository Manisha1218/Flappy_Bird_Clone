<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" aria-label="Flappy Bird Game"></canvas>
            <div class="score-hud" id="scoreHud" aria-live="polite">0</div>
            
            <div class="overlay" id="startScreen" role="dialog" aria-labelledby="gameTitle">
                <div class="title" id="gameTitle">FLAPPY</div>
                <div class="subtitle">Tap to fly through the pipes</div>
                <button class="btn" id="startBtn" aria-label="Start Game">PLAY</button>
                <div class="instructions">Space / Click / Tap to flap</div>
            </div>
            
            <div class="overlay hidden" id="gameOverScreen" role="dialog" aria-labelledby="gameOverTitle">
                <div class="subtitle" id="gameOverTitle">Game Over</div>
                <div class="score-display" id="finalScore" aria-label="Your Score">0</div>
                <div class="best-score">Best: <span id="bestScore">0</span></div>
                <div class="new-best hidden" id="newBestText">NEW RECORD</div>
                <button class="btn" id="restartBtn" aria-label="Play Again">RETRY</button>
            </div>
        </div>
    </div>
</body>
</html>
